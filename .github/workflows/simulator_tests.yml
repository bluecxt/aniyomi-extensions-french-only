name: Extension Simulators Audit

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '0 0 * * 0'
  workflow_dispatch:

jobs:
  audit:
    name: Run Simulators Audit
    runs-on: ubuntu-latest
    env:
      ANDROID_HOME: /home/actions-runner/.android/sdk
    steps:
      - uses: actions/checkout@v6

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          java-version: 17
          distribution: temurin

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Run Orchestrator
        run: python3 audit_extensions.py
