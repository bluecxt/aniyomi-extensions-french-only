name: Extension Simulators Audit

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  schedule:
    - cron: '0 0 * * 0'
  workflow_dispatch:

jobs:
  audit:
    name: Run Simulators
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Execute Simulators
        run: |
          SUMMARY=""
          EXIT_CODE=0
          
          echo "🚀 Démarrage de l'audit des extensions..."
          
          # Liste des extensions à tester
          EXTENSIONS=$(ls src/fr)
          
          for EXT_NAME in $EXTENSIONS; do
            SIM_PATH="src/fr/$EXT_NAME/simulator.py"
            echo "--------------------------------------------------"
            echo "🔎 Test de $EXT_NAME..."
            
            # Si un simulateur spécifique existe, on l'utilise, sinon on utilise l'universel
            if [ -f "$SIM_PATH" ]; then
              if python3 "$SIM_PATH"; then
                SUMMARY="${SUMMARY}\n| $EXT_NAME | ✅ PASS |"
              else
                SUMMARY="${SUMMARY}\n| $EXT_NAME | ❌ FAIL |"
                EXIT_CODE=1
              fi
            else
              if python3 anikku_simulator.py "$EXT_NAME"; then
                SUMMARY="${SUMMARY}\n| $EXT_NAME | ✅ PASS |"
              else
                SUMMARY="${SUMMARY}\n| $EXT_NAME | ❌ FAIL |"
                EXIT_CODE=1
              fi
            fi
          done
          
          echo -e "\n\n=================================================="
          echo -e "📊 RÉSUMÉ FINAL DE L'AUDIT"
          echo -e "=================================================="
          echo -e "| Extension | Statut |"
          echo -e "| :--- | :--- |"
          echo -e "$SUMMARY"
          echo -e "=================================================="
          
          # On ne fait pas échouer tout le workflow pour l'instant (optionnel)
          # exit $EXIT_CODE
          exit 0
