name: Extension Simulators Audit

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  schedule:
    - cron: '0 0 * * 0'
  workflow_dispatch:

jobs:
  audit:
    name: Run Simulators
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Execute Simulators
        run: |
          SUMMARY=""
          EXIT_CODE=0
          
          echo "🚀 Démarrage de l'audit des extensions..."
          
          for sim in src/fr/*/simulator.py; do
            if [ -f "$sim" ]; then
              EXT_NAME=$(basename $(dirname "$sim"))
              echo "--------------------------------------------------"
              echo "🔎 Test de $EXT_NAME..."
              
              if python3 "$sim"; then
                SUMMARY="$SUMMARY\n| $EXT_NAME | ✅ PASS |"
              else
                SUMMARY="$SUMMARY\n| $EXT_NAME | ❌ FAIL |"
                EXIT_CODE=1
              fi
            fi
          done
          
          echo -e "\n\n=================================================="
          echo -e "📊 RÉSUMÉ DE L'AUDIT"
          echo -e "=================================================="
          echo -e "| Extension | Statut |"
          echo -e "| :--- | :--- |"
          echo -e "$SUMMARY"
          echo -e "=================================================="
          
          exit $EXIT_CODE
