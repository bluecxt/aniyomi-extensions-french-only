allprojects {
    tasks.configureEach { task ->
        if (task.hasProperty("aapt2Executable")) {
            try {
                // Utilise le aapt2 natif installé via 'sudo apt install aapt2'
                task.aapt2Executable.set(file("/usr/bin/aapt2"))
            } catch (Exception e) {
                // Ignore if not compatible
            }
        }
    }
}
